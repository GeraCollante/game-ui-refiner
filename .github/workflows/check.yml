name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Install root dependencies
        run: npm install

      - name: Install tools dependencies
        working-directory: tools
        run: npm install

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: TypeScript build
        run: npm run build

      - name: Static analyzer (check.mjs)
        run: node tools/check.mjs

      - name: Parser unit tests
        run: node tests/run.mjs

      - name: Python lint
        run: ruff check serve.py

      - name: Python format check
        run: ruff format --check serve.py

  smoke:
    name: serve.py smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Start server in background
        run: |
          python3 serve.py 8765 > /tmp/serve.log 2>&1 &
          sleep 1

      - name: Curl index
        run: |
          STATUS=$(curl -s -o /tmp/idx.html -w "%{http_code}" http://localhost:8765/)
          test "$STATUS" = "200" || (echo "expected 200, got $STATUS" && cat /tmp/serve.log && exit 1)
          grep -q 'type="module"' /tmp/idx.html
          grep -q 'window.GEMINI_API_KEY' /tmp/idx.html

      - name: Curl compiled main.js
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8765/js/main.js)
          test "$STATUS" = "200" || (echo "expected 200, got $STATUS" && exit 1)

      - name: Curl /save endpoint with sample payload
        run: |
          RESP=$(curl -s -X POST http://localhost:8765/save \
            -H 'Content-Type: application/json' \
            -d '{"session":"ci_test","filename":"hello.txt","text":"hi from CI"}')
          echo "$RESP"
          echo "$RESP" | grep -q '"ok": true'
          test -f runs/ci_test/hello.txt
